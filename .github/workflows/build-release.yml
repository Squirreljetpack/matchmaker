name: Build and Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: mm
            asset_name: matchmaker-linux.tar.gz

          - os: macos-latest
            artifact_name: mm
            asset_name: matchmaker-mac.tar.gz

          - os: windows-latest
            artifact_name: mm.exe
            asset_name: matchmaker-windows.zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build Release
        run: cargo build --release -F experimental

      - name: Archive Binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          tar -czf ${{ matrix.asset_name }} target/release/${{ matrix.artifact_name }}

      - name: Archive Binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path target/release/${{ matrix.artifact_name }} `
            -DestinationPath ./${{ matrix.asset_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

