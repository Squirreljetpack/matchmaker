[tui]
percentage = 60
min = 10
max = 120

# --- UI ---
[ui]

[query]

[results]
wrap = true

[status]

[header]
[footer]

# --- Preview ---
[preview]
show = true
wrap = true

[[preview.layout]]
command = '''
if [ -d {} ]; then
    if command -v eza >/dev/null 2>&1; then
        eza --color=always -T -L 2 {}
    else
        find {} -maxdepth 2 | sed 's|[^/]*/|  |g'
    fi
else
    if command -v bat >/dev/null 2>&1; then
        bat --binary no-printing --color=always {}
    elif command -v $PAGER >/dev/null 2>&1; then
        $PAGER {}
    else
        cat {}
    fi
fi
'''

side = "right"
percentage = 40
min = 30
max = 120
border.type = "Plain"
border.padding = [2, 0]

[[preview.layout]]
side = "top"
percentage = 50
min = 5
max = 50
border.type = "Plain"

[[preview.layout]]
side = "right"
percentage = 75
min = 5
max = 240
border.type = "Plain"
border.padding = [2, 0]

[previewer]
always_trigger = true

# --- Misc ---
[matcher]

[columns]

[start]
command = '''
if command -v fd >/dev/null 2>&1; then
    fd --strip-cwd-prefix --print0
else
    find . -print0
fi
'''
command_input_separator = "\\0"

[exit]


# --- Binds ---
[binds]
# UI
"ctrl-c" = "Quit"
"esc" = "Quit"
"enter" = "@accept"
"ctrl-enter" = "@accept_2"
"ctrl-a" = "CycleAll"
"tab" = ["Toggle", "Down"]
"shift-backtab" = ["Toggle", "Up"]

# Edit
"right" = "ForwardChar"
"left" = "BackwardChar"
"ctrl-right" = "ForwardWord"
"ctrl-left" = "BackwardWord"
"backspace" = "DeleteChar"
"ctrl-h" = "DeleteWord"
"ctrl-u" = "Cancel"
"alt-a" = "QueryPos(0)"

# Navigation
"up" = "Up"
"down" = "Down"
"pagedown" = "HalfPageDown"
"pageup" = "HalfPageUp"
"shift-up" = "PreviewHalfPageUp"
"shift-down" = "PreviewHalfPageDown"
"ctrl-shift-up" = "VScroll(1)"
"ctrl-shift-down" = "VScroll(-1)"
"ctrl-shift-left" = "HScroll(-1)"
"ctrl-shift-right" = "HScroll(1)"
"alt-up" = "VScroll(1)"
"alt-down" = "VScroll(-1)"
"alt-left" = "HScroll(-1)"
"alt-right" = "HScroll(1)"
"alt-1" = "Pos(0)"

# Columns
"ctrl-." = "NextColumn"

# Preview
"shift+scrollup" = "PreviewUp"
"shift+scrolldown" = "PreviewDown"
"?" = "SwitchPreview"
"shift-?" = "SwitchPreview"
"ctrl-shift-/" = "CyclePreview"    # cycle preview layouts
"alt-h" = "Help"

# Programmable
"ctrl-l" = "@look"         # "maximize" the preview
"ctrl-o" = "@open"
"alt-o" = "@open_2"
"ctrl-r" = "@reload"
"alt-p" = "@print"
"ctrl-y" = "@copy"
"ctrl-shift-y" = "@copy_2"

"@look" = "Execute(eval $MM_PREVIEW_COMMAND | $PAGER)"
"@open" = "Execute($EDITOR {})"
"@open_2" = "Become($EDITOR {})"
"@reload" = "Reload"
"@print" = "Print({-})"
"@copy" = '''
Execute(
printf '%s\n' {+1} | (command -v pbcopy >/dev/null && pbcopy || command -v wl-copy >/dev/null && wl-copy || command -v xclip >/dev/null && xclip -selection clipboard || command -v xsel >/dev/null && xsel --clipboard --input)
)
'''
"@copy_2" = '''
Execute(
printf '%s\n' {+} | (command -v pbcopy >/dev/null && pbcopy || command -v wl-copy >/dev/null && wl-copy || command -v xclip >/dev/null && xclip -selection clipboard || command -v xsel >/dev/null && xsel --clipboard --input)
)
'''

"@accept" = "Accept"
"@accept_2" = "Accept"
