# picker configuration file

[tui]
percentage = 60
min = 10
max = 120

[ui]
# border    = { color = "blue", bg = "#282828" }
tick_rate = 30

[query]
style.fg = "White"
cursor = "default"
prompt = ">"

[header]
content = "test"
header_lines = 2
interactions = [[[0, "test"]], [[1, "test"], [3, "open"], [4, ""]]]

[results]
scroll_padding = 2

# border           = { type = "Rounded", sides = "", padding = 0 }
style.fg = "White"
current.bg = "Black"
current.modifier = "BOLD"
match.fg = "Green"

# reverse = auto
wrap = true

scroll_wrap = true

[status]
style.fg = "Green"
style.modifier = "ITALIC"

[previewer]
try_lossy = false
max_procs = 4
always_trigger = true

[preview]
# border      = { type = "Rounded", color = "Blue" }
scroll_wrap = true
show = true
wrap = true

[[preview.layout]]
command = '''
if [ -d {} ]; then
    cd {} &&
    find . -maxdepth 2 | sed 's|[^/]*/|  |g'
else
    cat {}
fi
'''
side = "right"
percentage = 40
min = 30
max = 120

[[preview.layout]]
side = "top"
percentage = 40
min = 30
max = 120

[binds]
# Essentia
"ctrl-c" = "Quit"
"esc" = "Quit"
"enter" = "@accept"
"ctrl-enter" = "@accept_2"
"ctrl-a" = "CycleAll"
"tab" = ["Select", "Down"]
"shift-backtab" = ["Toggle", "Up"]

# Edit
"right" = "ForwardChar"
"left" = "BackwardChar"
"ctrl-right" = "ForwardWord"
"ctrl-left" = "BackwardWord"
"backspace" = "DeleteChar"
"ctrl-h" = "DeleteWord"
"ctrl-u" = "Cancel"

# Navigation
"up" = "Up"
"down" = "Down"
"pageup" = "HalfPageDown"
"pagedown" = "HalfPageUp"
"ctrl-p" = "Up(10)"
"ctrl-n" = "Down(10)"
"shift-up" = "PreviewUp"
"shift-down" = "PreviewDown"
"ctrl-shift-up" = "PreviewHalfPageUp"
"ctrl-shift-down" = "PreviewHalfPageDown"
"shift-right" = "HScroll(1)"
"shift-left" = "HScroll(-1)"

"shift+scrollup" = "PreviewUp"
"shift+scrolldown" = "PreviewDown"
"alt-h" = "Help"
"?" = "SwitchPreview(0)"
"shift-?" = "SwitchPreview(0)"
"ctrl-/" = "CyclePreview"
"ctrl-shift-/" = "CyclePreview" # ctrl-shift-/

# Columns
"ctrl-." = "NextColumn"

"alt-enter" = "Print({1})"

# Programmable
"ctrl-l" = "@look" # "maximize" the preview
"ctrl-o" = "@open"
"alt-o" = "@open_2"
"ctrl-r" = "@reload"
"ctrl-shift-n" = "@next"

"@accept" = "Accept"
"@accept_2" = "Accept"
"@look" = "Execute(eval $MM_PREVIEW_COMMAND | $PAGER)"
"@open" = "Execute($EDITOR {})"
"@open_2" = "Become($EDITOR {})"
"@reload" = "Reload"

# Printing
"alt-p" = "@print"
"alt-shift-p" = "@print_2"
"ctrl-y" = "@copy"
"ctrl-shift-y" = "@copy_2"
"alt-y" = "@copy_3"

"@print" = "Print({-})"
"@print_2" = "Print({-!})"
"@copy" = '''
ExecuteSilent(
out="$(printf '%s\n' {+1})"
printf "$out" | (pbcopy || wl-copy || xclip -selection clipboard || xsel --clipboard --input) 2>/dev/null
)
'''
"@copy_2" = '''
ExecuteSilent(
printf '%s' {} | eval $CLIPcmd
)
'''
"@copy_3" = '''
ExecuteSilent(
out="$(printf '%s\n' {+!})"
printf "$out" | eval $CLIPcmd
)
'''

# test
"alt-t" = "@test"
"@test" = "Execute(echo ----; read v; echo $v; echo ----)"

[matcher]
trim = true
sort_threshold = 1

[columns]
split = '\s+'
max = 8

[start.command]
cmd = '''
    if command -v fd >/dev/null 2>&1; then
        fd --strip-cwd-prefix --print0
    else
        find . -print0
    fi
    '''
separator = "\\0"

[exit]
select_1 = false
