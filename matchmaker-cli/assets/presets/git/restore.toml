# restore a file or revision
source = 'base.toml'

[start]
command = 'git log --pretty=format:"%h%x00%ad%x00%s" --date=format:"$DATE_FORMAT" -- "${1:-.}"'
additional_commands = [
  'git log --pretty=format:"%h%x00%ad%x00%s" --date=format:"$DATE_FORMAT" -- "${1:-.}"',
  '''
  if $HAS_AWK; then
      git stash list --format="%gd%x00%at%x00%gs" |
      awk -F'\x00' -v OFS='\x00' -v fmt="$DATE_FORMAT" \
          '{$2 = strftime(fmt, $2); print}'
  else
      git stash list --format="%gd%x00%cr%x00%gs"
  fi
  ''',
  '''
  if $HAS_AWK; then
    git reflog --all --format="%h%x00%at%x00%gD: %gs" -- "${1:-.}" |
    awk -F'\x00' -v OFS='\x00' -v fmt="$DATE_FORMAT" \
      '{$2 = strftime(fmt, $2); print}'
  else
      git reflog --date=human --format="%h%x00%ad%x00%s" -- "${1:-.}"
  fi
  ''',
  'git log --all --pretty=format:"%h%x00%ad%x00%s" --date=format:"$DATE_FORMAT" -- "${1:-.}"',
]

[columns]
split = "\\x00"
max = 3
default = 1

[matcher]
sort = 40

[envs]
# --date=human looks better but is less searchable
DATE_FORMAT = "%Y-%m-%d %H:%M"
HAS_AWK = { value = "awk 'BEGIN { strftime(); exit }' >/dev/null 2>&1 && echo true || echo false", exec = true }

# --- Preview ---
[previewer]
always_trigger = false

[[preview.layout]]
command = '''
git -c color.ui=always show --stat --summary --decorate {1}
'''
side = "right"
percentage = 40
min = 30
max = 120

[[preview.layout]]
side = "top"
percentage = 50
min = 5
max = 50
command = '''
if ((MM_INDEX == 1)); then
  echo "stash..stash base"
  printf "%${COLUMNS}s\n" | tr ' ' '-'
  git -c color.ui=always stash show -p {1} -- {$0}
else
  git diff --color=always --exit-code {1} -- {$0} && echo "no change"
fi
'''

[[preview.layout]]
command = '''
f={$1}
if [ -f "$f" ]; then
  git show --color=always {1}:"$f" | PG_FILENAME="$f" $PAGER
else
  git show --color=always {1}
fi
'''

# --- UI ---
[tui]
percentage = 100

[header]
content = "[history]"
style.modifier = ""

[query]
prompt = "restore> "

[binds]
"@accept" = ["@checkout", "Reload"]
"@accept_2" = [
  "#apply stash/hard reset",
  '''BecomeOr(
set -e
case $MM_INDEX in
  0|3)
  echo hard resetting...
  git --no-pager diff --stat {1} ;;
  1)
    echo "\n###############\nWorking directory: \n###############\n"
    git --no-pager diff --stat
    echo "\n###############\nStash changes: \n###############\n"
    git --no-pager stash show {1}
    echo
  ;;
esac

printf 'Proceed? [y/N] '
read -r c
case $c in
  [y]) ;;
  [*]) kill $$ ;;
esac

case $MM_INDEX in
1) git stash apply {1} ;;
*) git reset --hard {1} ;;
esac
)''',
]
"ctrl-t" = ["@tag", "Reload"]
"alt-r" = "@soft_reset"
"@rm" = ["@clean", "Reload"]
"ctrl-c" = "@compare"

"@next" = "BecomeSilent(mm -o git/switch)"
"@prev" = "BecomeSilent(mm -o git/status)"

# --- Scripts ---
"Reloaded" = '''Transform(
    HEADERS=(
      '[history]'
      '[stash]'
      '[all_refs]'
      '[reachable]'
    )
    setopt KSH_ARRAYS 2>/dev/null
    echo "SetHeader(${HEADERS[$MM_INDEX]})"
)
'''
"@reload" = "ReloadNext"
"@reload_2" = "ReloadPrev"

"@open" = "Execute($EDITOR {$1})"
"@open_2" = []

"@compare" = '''RunPreview(
set -- $(git rev-list --left-right --count HEAD..{1})
behind=$1
ahead=$2
commits=$(git rev-list --count {1})
echo "behind: $behind ahead: $ahead commits: $commits"
printf "%${COLUMNS}s\n" | tr ' ' '-'
git log --color=always --left-right --oneline ...{1}
)'''

"@checkout" = '''
BecomeOr(
set -e

case $MM_INDEX in
  0|3) git --no-pager diff --stat {1} -- {$1} ;;
  1)
    echo "\n###############\nWorking directory: \n###############\n"
    git --no-pager diff --stat
    echo "\n###############\nStash changes: \n###############\n"
    git --no-pager stash show {1}
    echo
  ;;
esac

[ -n "$(git status --porcelain -- {$1})" ] &&
printf 'Proceed (or stash (all) changes)? [y/N/s/a] ' ||
printf 'Proceed? [y/N] '

read -r c
case $c in
  [s])
  git stash push -- {$1} ;;
  [au])
  git stash push -u -- {$1} ;;
  [y]) ;;
  *) kill $$ ;;
esac

case $MM_INDEX in
  # leave on success
  0|3) git checkout {1} -- {$1} ;;
  # return on success
  1) git stash pop {1} && kill $$ ;;
esac
)
'''

"@soft_reset" = '''BecomeOr(
set -e
case $MM_INDEX in
1)
  TARGET={1}
  FILES="$(git stash show --name-only "$TARGET" 2>/dev/null || true)"
  STASHED="$(git rev-parse refs/stash 2>/dev/null || true)"

  if [ -n "$FILES" ] &&
    printf '%s\n' "$FILES" |
    git status --porcelain --pathspec-from-file=- |
    grep -q .
  then
    printf 'Affected files are dirty. Proceed? [y/N/s(tash)] '
  else
    printf 'Proceed? [y/N] '
  fi

  read -r c
  case "$c" in
    [sS])
      if [ -n "$FILES" ]; then
        printf '%s\n' "$FILES" |
        git stash push -m "temp backup before stash pop" --pathspec-from-file=-
      else
        git stash push -m "temp backup stash pop"
      fi
      ;;
    [yY])
      ;;
    *)
      kill $$
      ;;
  esac

  # Shift target index if stash was created.
  NEW_STASH=$(git rev-parse refs/stash 2>/dev/null || true)
  if [ "$STASHED" != "$NEW_STASH" ] && [ -n "$NEW_STASH" ]; then
      STASHED=true
      N=$(echo "$TARGET" | grep -oE '[0-9]+' || echo 0)
      TARGET="stash@{$((N+1))}"
  else
      STASHED=false
  fi

  printf "Applying %s...\n" "$TARGET"
  git stash apply "$TARGET"

  printf "\nDiff after applying:\n"
  git -c color.ui=always status --short
  git diff --color=always || true

  printf '\nKeep changes? [Y/n/(p)reserve] '
  read -r ans2
  case "${ans2%% *}" in
    [yY]|'')
      git stash drop "$TARGET"
      ;;
    [pP])
      # Preserve: do nothing to the target stash
      ;;
    *)
      echo "Reverting stash..."
      git stash show -p "$TARGET" | git apply --reverse # kills script on fail
      ;;
  esac

  if $STASHED; then
      echo "Restoring previous working directory state..."
      git stash pop stash@{0}
  fi
  ;;
*)
  git --no-pager diff --color=always --name-status {1}..HEAD
  printf "Soft reset to %s? [y/N] " {1}
  read -r ans
  case "$ans" in
    [yY]*) git reset --soft {1} ;;
    *) kill $$ ;;
  esac
  ;;
esac
)'''

"@tag" = '''
BecomeOr(
set -e

case $MM_INDEX in
0|3)
  printf "Enter tag name for %s: " {1}
  read -r tag_name

  [ -n "$tag_name" ]
  delete="";
  remote=$(git rev-parse --abbrev-ref --symbolic-full-name @{u})

  if git rev-parse -q --verify "refs/tags/$tag_name" >/dev/null; then
    printf "Tag '%s' already exists. Remove it? [y/N] " "$tag_name"
    read -r ans

    case "$ans" in
      [yY]*)
        git tag -d "$tag_name"
        echo "Deleted local tag $tag_name"
        delete=--delete
        ;;
      *)
        kill $$
        ;;
    esac
  else
    git tag "$tag_name" {1}
    echo "Tagged {1} as $tag_name"
  fi

  printf "push tag '%s' to $remote? [y/(f)orce/N] " "$tag_name"
  read -r ans

  case "$ans" in
    [fF]*)
      git push --force $delete $remote "$tag_name"
      ;;
    [yY]*)
      git push $delete $remote "$tag_name"
      ;;
    *)
      kill $$
      ;;
  esac
  ;;
1)
  printf "Branch name for %s: " {1}
  read -r ans
  if [ -n "$ans" ]; then
    git stash branch "$ans" {1}
  fi
  ;;
2)
  printf "Branch name for reflog entry %s: " {1}
  read -r ans
  if [ -n "$ans" ]; then
    git branch "$ans" {1}
  fi
  ;;
esac
)'''

"@clean" = '''
ExecuteOrConfirm(
set -e

case $MM_INDEX in
0)
  printf "Run aggressive GC (rewrites object storage, removes unreachable data)? [y/N] "
  read -r ans
  case "$ans" in
    [yY]*)
      git gc --prune=now --aggressive
      false
      ;;
  esac
  ;;

1)
  git stash drop {1}
  ;;

2)
  printf "Run full cleanup GC (expires reflogs + removes unreachable objects immediately)? [y/N] "
  read -r ans
  case "$ans" in
    [yY]*)
      git -c gc.reflogExpire=0 -c gc.reflogExpireUnreachable=0 \
      -c gc.rerere.rresolved=0 -c gc.rerere.unresolved=0 \
      -c gc.pruneExpire=now gc
      false
      ;;
  esac
  ;;

3)
  echo "Unavailable"
  exit 1
  ;;

esac
)'''
