"@checkout" = '''
Become(
git --no-pager diff --stat {1} -- {$1}

[ -n "$(git status --porcelain -- {$1})" ] &&
printf 'Proceed? [y/N/s] ' ||
printf 'Proceed? [y/N] '

read -r c
case $c in
  [s])
  git stash push -- {$1} ;;
  [u])
  git stash push -u -- {$1} ;;
  [y]) ;;
  *) exit 0 ;;
esac
git checkout {1} -- {$1}
)
'''

"@accept_2" = '''
Become(
case $MM_INDEX in
0|3) printf '%s\n' {+1} ;;
1) git reset --hard {1} ;;
2) git stash apply {1} ;;
esac
)'''

"@soft_reset" = '''Become(
set -e

case $MM_INDEX in
2)
  TARGET={1}
  FILES="$(git stash show --name-only "$TARGET" 2>/dev/null || true)"
  STASHED="$(git rev-parse refs/stash 2>/dev/null || true)"

  if [ -n "$FILES" ] &&
    printf '%s\n' "$FILES" |
    git status --porcelain --pathspec-from-file=- |
    grep -q .
  then
    printf 'Affected files are dirty. Proceed? [y/N/s(tash)] '
  else
    printf 'Proceed? [y/N] '
  fi

  read -r c
  case "$c" in
    [sS])
      if [ -n "$FILES" ]; then
        printf '%s\n' "$FILES" |
        git stash push -m "temp backup" --pathspec-from-file=-
      else
        git stash push -m "temp backup"
      fi
      ;;
    [yY])
      ;;
    *)
      echo "Cancelled."
      exit 0
      ;;
  esac

  # Shift target index if stash was created.
  NEW_STASH=$(git rev-parse refs/stash 2>/dev/null || true)
  if [ "$STASHED" != "$NEW_STASH" ] && [ -n "$NEW_STASH" ]; then
      STASHED=true
      N=$(echo "$TARGET" | grep -oE '[0-9]+' || echo 0)
      TARGET="stash@{$((N+1))}"
  else
      STASHED=false
  fi

  printf "Applying %s...\n" "$TARGET"
  git stash apply "$TARGET"

  printf "\nDiff after applying:\n"
  git status --short
  git diff --color=always || true

  printf '\nKeep changes? [y/N/(p)reserve] '
  read -r ans2
  case "$ans2" in
    [yY])
      git stash drop "$TARGET"
      ;;
    [pP])
      # Preserve: do nothing to the target stash
      ;;
    *)
      echo "Reverting stash..."
      git stash show -p "$TARGET" | git apply --reverse # kills script on fail
      ;;
  esac

  if $STASHED; then
      echo "Restoring previous working directory state..."
      git stash pop stash@{0}
  fi
  ;;
*)
  git diff --name-status {1}..HEAD
  printf "Soft reset to %s? [y/N] " {1}
  read -r ans
  case "$ans" in
    [yY]*) git reset --soft {1} ;;
    *) echo "cancelled" ;;
  esac
  ;;
esac
)'''

"@tag_or_drop" = '''
Execute(
set -e

case $MM_INDEX in
0|3)
  printf "Enter tag name for %s: " {1}
  read -r tag_name

  [ -n "$tag_name" ]
  delete="";
  remote=$(git rev-parse --abbrev-ref --symbolic-full-name @{u})

  if git rev-parse -q --verify "refs/tags/$tag_name" >/dev/null; then
    printf "Tag '%s' already exists. Remove it? [y/N] " "$tag_name"
    read -r ans

    case "$ans" in
      [yY]*)
        git tag -d "$tag_name"
        echo "Deleted local tag $tag_name"
        delete=--delete
        ;;
      *)
        exit
        ;;
    esac
  else
    git tag "$tag_name" {1}
    echo "Tagged {1} as $tag_name"
  fi

  printf "(force) push tag '%s' to $remote? [y/f/N] " "$tag_name"
  read -r ans

  case "$ans" in
    [fF]*|force)
      git push --force $delete $remote "$tag_name"
      ;;
    [yY]*)
      git push $delete $remote "$tag_name"
      ;;
    *)
      exit
      ;;
  esac
  ;;
1)
  printf "Bookmark reflog %s with new branch name: " {1}
  read -r bname
  if [ -n "$bname" ]; then
    git branch "$bname" "{1}"
    echo "Created branch '$bname'"
  fi
  ;;
2)
  git stash drop {1}
  ;;
esac
)'''
