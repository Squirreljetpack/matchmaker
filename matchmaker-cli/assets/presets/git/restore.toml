# restore a file or revision

[start]
command = 'git log --pretty=format:"%h%x1f%ad%x1f%s" --date=human -- "${1:-.}"'
additional_commands = [
  'git log --pretty=format:"%h%x1f%ad%x1f%s" --date=human -- "${1:-.}"',
  'git reflog --date=human --format="%h%x1f%ad%x1f%s" -- "${1:-.}"',
  'git stash list --format="%gd%x1f%cr%x1f%gs"',
  'git log --all --pretty=format:"%h%x1f%ad%x1f%s" --date=human -- "${1:-.}"',
]

[columns]
split = "\\x1f"
max = 3
default = 3

[matcher]
sort = 20

[envs]
DFT_COLOR = "always"

# --- Preview ---
[previewer]
always_trigger = false

[[preview.layout]]
command = '''
git -c color.ui=always show --stat --summary --decorate {1}
'''
side = "right"
percentage = 40
min = 30
max = 120

[[preview.layout]]
side = "top"
percentage = 50
min = 5
max = 50
command = '''
if ((MM_INDEX == 2)); then
  git -c color.ui=always stash show -p {1} -- {$0}
else
  git diff --color=always --exit-code {1} -- {$0} && echo "no change"
fi
'''

[[preview.layout]]
command = '''
git show {1}:{$1}
'''

# --- UI ---
[tui]
percentage = 100

[header]
content = "[history]"
style.fg = "Blue"
style.modifier = ""

[binds]
"enter" = "@checkout"
"ctrl-t" = ["@tag_or_drop", "Reload"]
"alt-r" = "@soft_reset"
"alt-s" = "@show"

# --- Scripts ---
"Start" = ["Store(0)"]
"Reloaded" = '''Transform(
    HEADERS=(
      '[history]'
      '[reflog]'
      '[stash]'
      '[all_refs]'
    )
    setopt KSH_ARRAYS 2>/dev/null
    echo "SetHeader(${HEADERS[$MM_INDEX]})"
)
'''
"@reload" = "ReloadNext"
"@reload_2" = "ReloadPrev"

"@open" = "Execute($EDITOR {$1})"
"@open_2" = []

