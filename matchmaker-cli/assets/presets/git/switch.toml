# Intelligently switch to any ref
source = 'base.toml'

[start]
command = '''
git for-each-ref --format='%(objectname:short) %(refname:strip=2)' refs/heads
git remote |
while read -r remote; do git for-each-ref --format="%(objectname:short) %(refname)" "refs/remotes/$remote/" |
grep -v '/HEAD$' |
sed "s| refs/remotes/$remote/| $remote:|"; done
'''
additional_commands = [
    "",
    "git for-each-ref --format='%(objectname:short) %(refname:lstrip=2)' refs/tags",
    # "git ls-remote | awk '{print substr($1,1,7), $2}'", # unfiltered
    '''
    git ls-remote "$(eval $LSREMOTE)" 'refs/heads/*' 'refs/tags/*' 'refs/pull/*/head' 'refs/merge-requests/*/head' | awk '{sub(/^refs\//, "", $2); print substr($1,1,7), $2}'
    ''',
    '''
    git show-ref | awk '{sub(/^refs\//, "", $2); print substr($1,1,7), $2}'
    ''',
]

[envs]
# same logic as git ls-remote default
"LSREMOTE" = { value = "git config branch.$(git symbolic-ref --short -q HEAD).remote || echo origin" }

[columns]
split = " "
max = 2
default = 2

[matcher]
sort = 40

# --- Preview ---
[previewer]
always_trigger = false

[[preview.layout]]
command = '''
set -- $(git rev-list --left-right --count HEAD...{1})
behind=$1
ahead=$2
commits=$(git rev-list --count {1})
echo "behind: $behind ahead: $ahead commits: $commits"
printf "%${COLUMNS}s\n" | tr ' ' '-'
git log --color=always --left-right --oneline ...{1}
'''
# side = "right"
# percentage = 40
# min = 30
# max = 120

[[preview.layout]]
command = '''
echo {1}..
printf "%${COLUMNS}s\n" | tr ' ' '-'
git diff --color=always --exit-code {1} -- {$0} && echo "no change"
'''
# side = "top"
# percentage = 50
# min = 5
# max = 50

[[preview.layout]]
command = '''
git log --color=always --graph --decorate --pretty=oneline --abbrev-commit {1}
'''
# side = "right"
# percentage = 75
# min = 5
# max = 240

[[preview.layout]]
command = '''
git log --color=always --stat --summary --decorate {1}
'''
side = "right"
percentage = 40
min = 30
max = 120
border.type = "Plain"
border.padding = [2, 0]

# --- UI ---
[tui]
percentage = 100

[query]
prompt = "switch> "

[binds]
"@accept" = "@switch"
"@accept_2" = ["@switch_silent", "Reload"]
"@rm" = ["@delete", "Reload"]

"ctrl-u" = ["@update", "Reload"]
"ctrl-a" = ["@add_remote", "Reload"]
"ctrl-n" = ["@add_branch", "Reload"]
"alt-r" = ["@show_remotes"]
"alt-a" = "@copy_remote"

"@next" = "BecomeSilent(mm -o git/grep)"
"@prev" = "BecomeSilent(mm -o git/restore)"

# --- Scripts ---
"Start" = '''Transform(
    HEADERS=(
      branches
      tags
      ls-remote
      refs
    )

    case "$MM_INDEX" in
        0) ref=" ($(git symbolic-ref --short HEAD 2>/dev/null || git rev-parse --short HEAD))" ;;
        2) ref=" ($(eval $LSREMOTE))" ;;
        3) ref=" (cached)" ;;
    esac

    setopt KSH_ARRAYS 2>/dev/null
    echo "SetHeader(${HEADERS[$MM_INDEX]}$ref)"
)
'''
"Reloaded" = '''Transform(
    HEADERS=(
      branches
      tags
      ls-remote
      refs
    )

    case "$MM_INDEX" in
        0) ref=" ($(git symbolic-ref --short HEAD 2>/dev/null || git rev-parse --short HEAD))" ;;
        2) ref=" ($(eval $LSREMOTE))" ;;
        3) ref=" (cached)" ;;
    esac

    setopt KSH_ARRAYS 2>/dev/null
    echo "SetHeader(${HEADERS[$MM_INDEX]}$ref)"
)
'''

"@update" = '''
ExecuteOrConfirm(
set -e
case "$MM_INDEX" in
0)
    branch={2}
    if [[ "branch" == *":"* ]]; then
        remote="${branch%%:*}"
        echo "Fetching $remote..."
        git fetch "$remote"
    else
        current="$(git branch --show-current)"
        git switch "$branch"
        echo "Updating branch $branch..."
        git pull --rebase --autostash
        git status -sb
        git switch "$current"
    fi
    ;;
1)
    echo "Fetching tags..."
    git fetch --tags
    ;;
2)
    remote="$(eval $LSREMOTE)"
    echo "Fetching $remote..."
    git fetch $remote
    ;;
3)
    echo "Fetching all remotes (with prune)..."
    git fetch --all --prune
    ;;
esac
false
)
'''

"@switch" = '''
Become(
set -e
if [ -n "$(git -c color.ui=always status --porcelain -s | tee /dev/tty)" ]; then
    printf "Local changes detected, continue? [y/N/stash] "
    read -r ans
    case "$ans" in
        [sS]*) git stash ;;
        [yY]*) ;;
        *) exit 0 ;;
    esac
fi

case "$MM_INDEX" in
0)
  branch={2}
  git switch -q "${branch#*:}" &&
  git --no-pager branch -vv --list "$(git branch --show-current)" --color=always
  ;;
1)
  git switch --detach {2}
  ;;
2)
  ref=refs/{2}
  remote="$(eval "$LSREMOTE")"

  case "$ref" in
    refs/heads/*)
      name="${ref#refs/heads/}"
      git fetch "$remote" "$ref:$name"
      if git rev-parse --verify --quiet "$name"; then
          git switch "$name" && git branch --set-upstream-to="$remote/$name"
      else
          git switch -c "$name" --track "$remote/$name"
      fi
      ;;
    *)
      git fetch "$remote" "$ref"
      git switch --detach FETCH_HEAD
      ;;
  esac
  ;;
3)
  ref=refs/{2}
  case "$ref" in
    refs/heads/*)
      git switch "${ref#refs/heads/}"
      ;;
    *)
      git switch --detach "$ref"
      ;;
  esac
  ;;
esac
)
'''

"@switch_silent" = '''ExecuteOrConfirm(
set -e
case "$MM_INDEX" in
0)
    branch={2}
    git switch "${branch#*:}"
    ;;
1)
    git switch --detach {2}
    ;;
2)
    ref=refs/{2}
    remote="$(eval "$LSREMOTE")"
    case "$ref" in
    refs/heads/*)
        name="${ref#refs/heads/}"
        git fetch "$remote" "$ref:$name"
        git switch -c "$name" --track "$remote/$name"
        ;;
    *)
        git fetch "$remote" "$ref"
        git switch --detach FETCH_HEAD
        ;;
    esac
    ;;
3)
    ref=refs/{2}
    case "$ref" in
      refs/heads/*)
        git switch "${ref#refs/heads/}"
        ;;
      *)
        git switch --detach "$ref"
        ;;
    esac
    ;;
esac
)'''

"@delete" = '''
ExecuteOrConfirm(
set -e

case "$MM_INDEX" in
0)
    branch={2}
    if [[ "$branch" == *":"* ]]; then
         remote="${branch%%:*}"
         branch="${branch#*:}"
         if [ -n "$remote" ] && [ -n "$branch" ]; then
             printf "Delete remote branch '%s' from '%s'? [y/N]: " "$branch" "$remote"
             read -r confirm
             case "$confirm" in
                 [Yy]*)
                     echo "Deleting remote branch..."
                     git push "$remote" --delete "$branch"
                     ;;
                 *)
                     echo "Operation canceled."
                     exit 0
                     ;;
             esac
         else
             echo "Error: Invalid ref format. Expected 'remote:branch'."
             exit 1
         fi
    else
        printf "Delete local branch %s? [y/N] " "$branch"
        read -r ans

        case "$ans" in
            [yY]*)
                git branch -D "$branch"

                upstream="$(git rev-parse --abbrev-ref "$ref@{u}" 2>/dev/null || true)"

                if [ -n "$upstream" ]; then
                    remote="${upstream%%/*}"
                    branch="${upstream#*/}"

                    printf "Also delete remote branch %s/%s? [y/N] " "$remote" "$branch"
                    read -r rans

                    case "$rans" in
                        [yY]*)
                            git push "$remote" --delete "$branch"
                            ;;
                    esac
                fi
                ;;
            *)
                exit 0
                ;;
        esac
    fi
    ;;
1)
    set -- {+2};
    auto_remote=0
    remote="$(eval "$LSREMOTE")"

    while (($#)); do
        printf "Delete tag $1? [y/N/aA] "
        read -r ans

        case "$ans" in
            [aA]*)
                git tag -d "$@"

                printf "Delete remote tags too? [y/N] "
                read -r rans

                case "$rans" in
                    [yY]*)
                        for t in "$@"; do
                            set -- "$@" "refs/tags/$t"
                            shift
                        done

                        git push "$remote" --delete "$@"
                        ;;
                    *)
                        exit 0
                        ;;
                esac
                ;;
            [yY]*)
                git tag -d "$1"

                if [ "$auto_remote" -eq 1 ]; then
                    git push "$remote" --delete "refs/tags/$1"
                else
                    printf "Delete remote tag too? [y/N/(all)] "
                    read -r rans

                    case "$rans" in
                        [aA]*)
                            auto_remote=1
                            git push "$remote" --delete "refs/tags/$1"
                            ;;
                        [yY]*)
                            git push "$remote" --delete "refs/tags/$1"
                            ;;
                    esac
                fi

                shift
                ;;
            *)
                shift
                ;;
        esac
    done
    ;;
2)
    remote="$(eval $LSREMOTE)"
    set -- {+2}

    for arg in "$@"; do
        set -- "$@" "refs/$arg"
        shift
    done

    printf "Delete %d refs from %s? [Y/n]: " "$#" "$remote"
    read -r response

    case "$response" in
        [Yy]*|"")
            git push "$remote" --delete "$@"
            ;;
        *)
            echo "Deletion cancelled."
            exit 1
            ;;
    esac
    ;;
3)
    set -- {+2}

    type=""
    remote=""
    mixed_remotes=false

    # Guard against mixed types
    for item; do
        case "$item" in
            heads/*)
                current_type="head"
                set -- "$@" "${item#heads/}"
                ;;
            tags/*)
                current_type="tag"
                set -- "$@" "${item#tags/}"
                ;;
            remotes/*)
                current_type="remote"
                clean_ref="${item#remotes/}"
                current_remote="${clean_ref%%/*}"
                branch="${clean_ref#*/}"

                if [ -z "$remote" ]; then
                    remote="$current_remote"
                elif [ "$remote" != "$current_remote" ]; then
                    mixed_remotes=true
                fi

                set -- "$@" "$clean_ref"
                ;;
            *)
                echo "Unknown or unsupported reference type: $item"
                exit 1
                ;;
        esac

        if [ -n "$type" ] && [ "$type" != "$current_type" ]; then
            echo "Error: Mixed types are not supported." >&2
            exit 1
        fi
        type="$current_type"
        shift
    done

    case "$type" in
        head)
            printf "Delete %d local branches? [y/N] " "$#"
            read -r ans
            case "$ans" in
                [yY]*) git branch -D "$@" ;;
            esac
            ;;

        tag)
            printf "Delete %d tags? [y/N] " "$#"
            read -r ans
            case "$ans" in
                [yY]*) git tag -d "$@" ;;
            esac
            ;;

        remote)
            if $mixed_remotes; then
                printf "Mixed remotes detected. Delete %d local tracking caches? [y/N]: " "$#"
                read -r ans
                case "$ans" in
                    [yY]*)
                        echo "Deleting local tracking caches..."
                        git branch -d -r "$@"
                        ;;
                    *)
                        echo "Skipped."
                        ;;
                esac
            else
                printf "Delete %d remote branches from '%s'? [Y=push delete / c=cache only / n=cancel]: " "$#" "$remote"
                read -r ans

                case "$ans" in
                    [Yy]*|"")
                        echo "Pushing deletions to remote..."
                        # Extract just the branch names for the push command
                        for item; do
                            set -- "$@" "${1#*/}"
                            shift
                        done
                        git push "$remote" --delete "$@"
                        ;;
                    [Cc]*)
                        echo "Deleting local tracking caches..."
                        git branch -d -r "$@"
                        ;;
                    *)
                        echo "Skipped."
                        ;;
                esac
            fi
            ;;
    esac
    ;;

*)
    echo "Unavailable"
    exit 1
    ;;
esac
)
'''

"@rename" = '''
ExecuteOrConfirm(
set -e

remote="$(eval "$LSREMOTE")"

case "$MM_INDEX" in
0)
    branch={2}
    if [[ "$branch" == *":"* ]]; then
        old_remote="${branch%%:*}"
        printf "Rename REMOTE %s to: " "$old_remote"
        read -r new_name
        if [ -n "$new_name" ]; then
            # Rename
            git remote rename "$old_remote" "$new_name"
        else
            # Input was empty -> Prompt to delete
            printf "Do you want to DELETE remote '%s'? [y/N]: " "$old_remote"
            read -r confirm

            case "$confirm" in
                [Yy]*)
                    git remote remove "$old_remote"
                    ;;
                *)
                    echo "Operation canceled."
                    exit 0
                    ;;
            esac
        fi
    else
        printf "Rename branch %s to: " "$branch"
        read -r new_name
        [ -n "$new_name" ] || exit
        git branch -m "$branch" "$new_name"

        printf "push? [y/N] "
        read -r ans
        case "$ans" in
        [yY]*)
            git push "$remote" "$new_name" &&
            git push "$remote" --delete "$branch"
            ;;
        esac
    fi
    ;;
1)
    printf "Rename tag %s to: " {2}
    read -r new_tag
    [ -n "$new_tag" ] || exit

    git tag "$new_tag" {2}
    git tag -d {2}

    printf "push? [y/N] "
    read -r ans
    case "$ans" in
        [yY]*)
            git push "$remote" "$new_tag" &&
            git push "$remote" --delete "{2}"
            ;;
        [nN]*|'')
            git push "$remote" "$new_tag"
            ;;
    esac
    ;;
3)
    ref=refs/{2}
    case "$ref" in
        refs/heads/*)
            branch="${ref#refs/heads/}"
            printf "Rename local branch %s to: " "$branch"
            read -r new_name
            [ -n "$new_name" ] || exit
            git branch -m "$branch" "$new_name"
            ;;
        refs/tags/*)
            tag="${ref#refs/tags/}"
            printf "Rename tag %s to: " "$tag"
            read -r new_tag
            [ -n "$new_tag" ] || exit
            git tag "$new_tag" "$tag"
            git tag -d "$tag"
            ;;
        *)
            echo "Cannot rename remote tracking references."
            false
            ;;
    esac
    ;;
*)
    echo "Unavailable"
    false
    ;;
esac
)
'''

"@add_remote" = '''ExecuteOrConfirm(
set -e

remote="$(eval "$LSREMOTE")"

printf "Remote name [%s]: " "$remote"
read -r name
name="${name:-$remote}"

prompt_set=false

if git remote 2>/dev/null | grep -q "^$name$"; then
    current_url=$(git remote get-url "$name" 2>/dev/null)
    printf "Remote '%s' already exists (%s).\n" "$name" "$current_url"
    printf "Change its URL? [y/N] "
    read -r ans

    case "$ans" in
        [yY]*)
            printf "New URL: "
            read -r url
            git remote set-url "$name" "$url"
            ;;
        *)
            prompt_set=true
            ;;
    esac
else
    printf "Remote URL: "
    read -r url
    git remote add "$name" "$url"
    prompt_set=true
fi

current_branch=$(git symbolic-ref --short HEAD 2>/dev/null || true)
if $prompt_set && [ -n "$current_branch" ]; then
    upstream_remote=$(git config "branch.$current_branch.remote" 2>/dev/null || true)
    if [ "$upstream_remote" != "$name" ]; then
        printf "Set '%s' as the default remote for branch '%s'? [y/N] " "$name" "$current_branch"
        read -r set_def
        case "$set_def" in
            [yY]*)
                # We use git config here instead of branch --set-upstream-to
                # because it works completely offline without needing to fetch first.
                git config "branch.$current_branch.remote" "$name"
                git config "branch.$current_branch.merge" "refs/heads/$current_branch"
                ;;
        esac
    fi
fi
)'''

"@copy_remote" = '''CopyAsync(
remote="$(eval "$LSREMOTE")"
git remote get-url "$remote"
)
'''

"@add_branch" = '''ExecuteOrConfirm(
set -e
printf "New branch name: "
read -r branch
[ -n "$branch" ] || exit
git switch -c "$branch"
)'''

"@show_remotes" = '''ExecuteOrConfirm(
git remote | while IFS= read -r remote; do
    echo "=== $remote ==="
    git remote show "$remote"
    echo
done
false
)
'''
