# Intelligently switch to any ref

[start]
command = '''
git for-each-ref --format='%(objectname:short) %(refname:strip=2)' refs/heads
git remote |
while read -r remote; do git for-each-ref --format="%(objectname:short) %(refname)" "refs/remotes/$remote/" |
grep -v '/HEAD$' |
sed "s| refs/remotes/$remote/| $remote:|"; done
'''
additional_commands = [
  '''
git for-each-ref --format='%(objectname:short) %(refname:strip=2)' refs/heads
git remote |
while read -r remote; do git for-each-ref --format="%(objectname:short) %(refname)" "refs/remotes/$remote/" |
grep -v '/HEAD$' |
sed "s| refs/remotes/$remote/| $remote:|"; done
''',
  "git for-each-ref --format='%(objectname:short) %(refname:lstrip=2)' refs/tags",
  "git ls-remote --heads --tags ${1:-origin} | awk '{print substr($1,1,7), $2}'",
]

[columns]
split = " "
max = 2
default = 2

[matcher]
sort = 20

[envs]
DFT_COLOR = "always"

# --- Preview ---
[previewer]
always_trigger = false

[[preview.layout]]
command = '''
set -- $(git rev-list --left-right --count HEAD..{1})
behind=$1
ahead=$2
commits=$(git rev-list --count {1})
echo "behind: $behind ahead: $ahead commits: $commits"
printf '%*s\n' "$COLUMNS" '' | tr ' ' '#'
git log --color=always --left-right --oneline ...{1}
'''
# side = "right"
# percentage = 40
# min = 30
# max = 120

[[preview.layout]]
command = '''git diff --color=always --exit-code {1} -- {$0} && echo "no change"'''
# side = "top"
# percentage = 50
# min = 5
# max = 50

[[preview.layout]]
command = '''
git log --color=always --graph --decorate --pretty=oneline --abbrev-commit {1}
'''
# side = "right"
# percentage = 75
# min = 5
# max = 240

[[preview.layout]]
command = '''
git log --color=always --stat --summary --decorate {1}
'''
side = "right"
percentage = 40
min = 30
max = 120
border.type = "Plain"
border.padding = [2, 0]

# --- UI ---
[tui]
percentage = 100

[query]
prompt = "switch> "

[binds]
"enter" = "@switch"
"ctrl-d" = ["@delete", "Reload"]

"ctrl-s" = ["@switch_silent", "Reload"]
"ctrl-u" = ["@update", "Reload"]
"ctrl-a" = ["@add_remote", "Reload"]
"ctrl-n" = ["@add_branch", "Reload"]

"@next" = "BecomeSilent(mm -o git/grep)"
"@prev" = "BecomeSilent(mm -o git/restore)"

# --- Scripts ---
"Start" = '''Transform(
    HEADERS=(
      branches
      tags
      remotes
    )
    setopt KSH_ARRAYS 2>/dev/null
    ref="$(git symbolic-ref --short HEAD 2>/dev/null || git rev-parse --short HEAD)"
    echo "SetHeader(${HEADERS[$MM_INDEX]} ($ref))"
)
'''
"Reloaded" = '''Transform(
    HEADERS=(
      branches
      tags
      remotes
    )
    setopt KSH_ARRAYS 2>/dev/null
    ref="$(git symbolic-ref --short HEAD 2>/dev/null || git rev-parse --short HEAD)"
    echo "SetHeader(${HEADERS[$MM_INDEX]} ($ref))"
)
'''
"@reload" = "ReloadNext"
"@reload_2" = "ReloadPrev"

"@update" = '''
ExecuteOrKeep(
case "$MM_INDEX" in
0)
    ref={2}
    if [[ "$ref" == *":"* ]]; then
        remote="${ref%%:*}"
        echo "Fetching $remote..."
        git fetch "$remote"
    else
        current="$(git branch --show-current)"
        git switch "$ref"
        echo "Updating branch $ref..."
        git pull --rebase --autostash
        git status -sb
        git switch "$current"
    fi
    ;;
1)
    echo "Fetching tags..."
    git fetch --tags
    ;;
2)
    remote="$(git config --get branch.$(git branch --show-current).remote)"
    echo "Fetching $remote..."
    git fetch $remote
    ;;
esac
printf "\nPress enter to continue..."
read -r
)
'''

# Switch and exit: less spurious than switch_silent
"@switch" = '''
Become(
set -e
if [ -n "$(git status --porcelain)" ]; then
    printf "Local changes detected, continue? [y/N/stash] "
    read -r ans
    case "$ans" in
        [sS]*) git stash ;;
        [yY]*) ;;
        *) exit 0 ;;
    esac
fi

remote="$(git config --get branch.$(git branch --show-current).remote)"

case "$MM_INDEX" in
0)
  ref={2}
  ref=${ref#*:}
  git switch "$ref"
  ;;
1)
  git switch --detach {2}
  ;;
2)
  ref={2}
  case "$ref" in
    refs/heads/*)
      name="${ref#refs/heads/}"
      git fetch "$remote" "$ref:$name"
      git switch "$name"
      ;;
    refs/tags/*)
      git fetch "$remote" "$ref"
      git switch --detach FETCH_HEAD
      ;;
  esac
  ;;
esac
)
'''

"@switch_silent" = '''Execute(
case "$MM_INDEX" in
0)
    ref={2}
    ref=${ref#*:}
    git switch "$ref"
    ;;
1)
    git switch --detach {2}
    ;;
2)
    ref={2}
    case "$ref" in
    refs/heads/*)
        name="${ref#refs/heads/}"
        git fetch "$remote" "$ref:$name"
        git switch "$name"
        ;;
    refs/tags/*)
        git fetch "$remote" "$ref"
        git switch --detach FETCH_HEAD
        ;;
    esac
;;
esac
)'''

"@delete" = '''
ExecuteOrKeep(
set -e
case "$MM_INDEX" in
0)
    ref={2}
    if [[ "$ref" == *":"* ]]; then
         remote="${ref%%:*}"
         printf "Remove REMOTE %s? [y/N] " "$remote"
         read -r ans
         case "$ans" in [yY]*) git remote remove "$remote" ;; esac
    else
        printf "Delete local branch %s? [y/N] " "$ref"
        read -r ans

        case "$ans" in
            [yY]*)
                git branch -D "$ref"

                upstream="$(git rev-parse --abbrev-ref "$ref@{u}" 2>/dev/null || true)"

                if [ -n "$upstream" ]; then
                    remote="${upstream%%/*}"
                    branch="${upstream#*/}"

                    printf "Also delete remote branch %s/%s? [y/N] " "$remote" "$branch"
                    read -r rans

                    case "$rans" in
                        [yY]*)
                            git push "$remote" --delete "$branch"
                            ;;
                    esac
                fi
                ;;
        esac
    fi
    ;;
1)
    printf "Delete tag %s? [y/N] " {2}
    read -r ans
    case "$ans" in
        [yY]*)
            git tag -d {2}
            printf "Delete remote tag too? [y/N] "
            read -r rans
            case "$rans" in [yY]*) git push origin --delete refs/tags/{2} ;; esac
            ;;
    esac
    ;;
*)
    echo "Unavailable"
    ;;
esac
printf "\nPress enter to continue..."
read -r
)
'''

"@rename" = '''
ExecuteOrKeep(
set -e
case "$MM_INDEX" in
0)
    ref={2}
    if [[ "$ref" == *":"* ]]; then
        old_remote="${ref%%:*}"
        printf "Rename REMOTE %s to: " "$old_remote"
        read -r new_name
        [ -n "$new_name" ] || exit
        git remote rename "$old_remote" "$new_name"
    else
        printf "Rename branch %s to: " "$ref"
        read -r new_name
        [ -n "$new_name" ] || exit
        git branch -m "$ref" "$new_name"

        printf "push? [y/N] "
        read -r ans
        case "$ans" in
        [y]*)
            git push origin "$new_name" &&
            git push origin --delete "$ref"
            ;;
        [nN]*|'')
            git push origin "$new_name"
            ;;
        esac
    fi
    ;;
1)
    printf "Rename tag %s to: " {2}
    read -r new_tag
    [ -n "$new_tag" ] || exit

    git tag "$new_tag" {2}
    git tag -d {2}

    printf "push? [y/N] "
    read -r ans
    case "$ans" in
        [yY]*)
            git push origin "$new_tag" &&
            git push origin --delete "{2}"
            ;;
        [nN]*|'')
            git push origin "$new_tag"
            ;;
    esac
    ;;
*)
    echo "Unavailable"
    false
    ;;
esac
)
'''

"@add_remote" = '''
ExecuteOrKeep(
set -e
printf "Remote name: "
read -r name
[ -n "$name" ]
printf "Remote URL: "
read -r url
[ -n "$url" ]
git remote add "$name" "$url"
)
'''

"@add_branch" = '''ExecuteOrKeep(
set -e
printf "New branch name: "
read -r branch
[ -n "$branch" ] || exit
git switch -c "$branch"
)'''
