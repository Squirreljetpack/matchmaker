# Pi agent sessions browser

[start]
command = '''
if stat --version 2>/dev/null | grep -q GNU; then
    get_mtime() { stat -c %y -- "$1" | cut -d. -f1; }
else
    get_mtime() { stat -f "%Sm" -t "%Y-%m-%d %H:%M:%S" -- "$1"; }
fi

for f in **/*.jsonl; do
    base=$(basename -- "$f" .jsonl)
    session=${base##*_}
    ts=$(get_mtime "$f")

    cwd=$(head -n 1 -- "$f" | jq -r '.cwd')
    printf "%s\t%s\t%s\t%s\n" "$f" "$ts" "${cwd/#$HOME\//~/}" "$session"
done | sort -t $'\t' -r -k 2,2
'''

directory = { value = "~/.pi/agent/sessions", force = true }

[envs]
OPENcmd = "open"
TMPdir = "/tmp/pi/html"

[columns]
max = 4
names = [
    { name = "file", hidden = true },
    { name = "mtime", options = "Optional | OrUseDefault" },
    { name = "dir", options = "Optional" },
    { name = "id", options = "Optional | OrUseDefault" },
]
default = "dir"
split = '\t'

[header]
content = ["file", "mtime", "dir", "id"]
[matcher]
sort = 40
# --- Preview ---
[preview]
show = true
scroll.percentage = 70
scroll.index = 2

[[preview.layout]]
command = '''
jq -rs '
  (map(select(.type == "session")) | .[0] // \{}) as $session |
  (map(select(.type == "model_change")) | .[0] // \{}) as $model |
  (map(select(.type == "message" and .message.role == "user")) | .[0] // \{}) as $user_msg |
  (map(select(.type == "message" and .message.role == "assistant")) | last // \{}) as $assistant_msg |
  (map(select(.type == "message" and .message.usage != null)) | map(.message.usage)) as $all_usage |
  ($all_usage | map(.input // 0) | add // 0) as $input |
  ($all_usage | map(.cacheRead // 0) | add // 0) as $cache_read |
  ($all_usage | map(.cacheWrite // 0) | add // 0) as $cache_write |
  ($all_usage | map(.output // 0) | add // 0) as $output |
  ($all_usage | map(.cost.total // 0) | add // 0 | .*100 | round / 100) as $cost |
  ($input + $cache_read + $cache_write) as $total_input |
  ($total_input + $output) as $total_tokens |
  (
      if $session.timestamp then
        ($session.timestamp
         | sub("\\.[0-9]+Z$"; "Z")
         | fromdateiso8601
         | strftime("%Y-%m-%d %H:%M:%S"))
      else
        "N/A"
      end
  ) as $session_ts |
  "- Began: `\($session_ts)`",
  "- Model: `\($model.modelId // "N/A")`",
  "- Input: `\($total_input)`",
  "- Output: `\($output)`",
  "- Cost: `$\($cost)`",
  "",
  "# Prompt",
  "---",
  ([$user_msg.message.content // [] | .[] | select(.type == "text") | .text] | join("\n") // "N/A"),
  "",
  "# Response",
  "---",
  ([$assistant_msg.message.content // [] | .[] |
    if .type == "thinking" then "[thinking] \(.thinking)"
    elif .type == "text" then .text
    elif .type == "toolCall" then "[tool call: \(.name)] \(.arguments | tojson)"
    else empty end
  ] | join("\n") // "N/A")
' -- {file} | bat --wrap=never --color=always -pp -l md
'''

[[preview.layout]]
command = '''
"$(dirname -- "$MM_OVERRIDE")"/session_stats.py --price -- {+file}
'''

[[preview.layout]]
command = '''
if command -v bat >/dev/null 2>&1; then
    bat --wrap=never --color=always --style=full -- "$PWD"/{file}
else
    cat -- "$PWD"/{file}
fi
'''

# --- Binds ---
[binds]
"@show" = '''ExecuteOrConfirm(mkdir -p $TMPdir && node "$(dirname -- "$MM_OVERRIDE")"/export-session.mjs -o $TMPdir/session.html $PWD/{file} && eval $OPENcmd /tmp/pi/html/session.html)'''
"@accept_2" = '''ExecuteOrConfirm(fx {1})'''
"0,1^^@accept" = 'Become(cwd={dir}; cd "${cwd/#\~/$HOME}" && pi --session {id})'
"?" = "SwitchPreview"
"@rm" = ["ExecuteAsync(rm -- {+file})", "Reload"]
"@copy" = "CopyAsync(printf '%s\n' {+id})"
"@copy_all" = "CopyAsync(printf '%s\n' {+file})"
