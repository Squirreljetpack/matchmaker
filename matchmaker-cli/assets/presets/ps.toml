# Find and kill processes

[start]
command = "ps -eo pgid,pid,user,%cpu,vsz,rss,etime,stat,command"
additional_commands = [
  "ps -eo pgid,pid,user,%cpu,vsz,rss,etime,stat,command",
  "lsof -nP -i",
]
ansi = false
trim = true

[header]
header_lines = 1
content = '[procs]'
style.modifier = ""

[columns]
split = ' +'
max = 9
default = 9

[matcher]
# --- Preview ---

[preview]
show = false

[[preview.layout]]
# Tree view
command = '''
if command -v pstree >/dev/null 2>&1; then
    if [[ "$OSTYPE" == "darwin"* ]]; then
        pstree -p {2}
    else
        pstree -ap {2}
    fi
else
    if ps --version 2>/dev/null | grep -q procps; then
        ps -f --forest -p $pid
    else
        if [[ "$OSTYPE" == "darwin"* ]]; then
            args=,wq
        else
            args=,thcount
        fi

        ps -ww -eo user,pid,ppid,pgid,sess,tty,lstart,time,rss,vsz,pcpu,pmem,stat$args,command {2}
    fi
fi
'''

[[preview.layout]]
command = "echo '### Ports ###\n'; lsof -p {2}"

[[preview.layout]]
command = "echo '### Resources ###\n'; top -pid {2}"
initial.tail = true

[binds]
"Reloaded" = '''Transform(
    HEADERS=(
      '[procs]'
      '[ports]'
    )
    setopt KSH_ARRAYS 2>/dev/null
    echo "SetHeader(${HEADERS[$MM_INDEX]})"
)
'''
"@reload_2" = []

"@accept" = ["#print pid", "Become(printf '%s\n' {+2})"]
"@accept_2" = ["#print active", "Become(printf '%s\n' {+!})"]

"ctrl-k" = ["#kill", "Execute(kill {2} || read)"]
"alt-k" = ["#kill -9", "Execute(kill -9 {2} || read)"]

"ctrl-shift-k" = ["#kill parent", "Execute(kill {1} || read)"]
"alt-shift-k" = ["#kill parent -9", "Execute(kill -9 {1} || read)"]

"ctrl-g" = ["#kill group", "Execute(kill -- -$(ps -o pgid= -p {2}) || read)"]
"alt-g" = ["#kill group -9", "Execute(kill -9 -- -$(ps -o pgid= -p {2}) || read)"]

"@copy" = '''
ExecuteSilent(
printf '%s\n' {+2} | eval $CLIPcmd
)
'''

[tui]
