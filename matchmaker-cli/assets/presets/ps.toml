"ctrl-g" = [
    "#kill group",
    '''ExecuteOrConfirm(
        pids=({+2})
        [ ${#pids[@]} -gt 1 ] && {
            printf "Kill: %s [y/N] " "${pids[*]}"
            read -r
            [[ $REPLY != [yY]* ]] && exit 0
        }

        for p in "${pids[@]}"; do
            pgid=$(ps -o pgid= -p "$p" | tr -d ' ')
            [[ -n $pgid ]] && kill -- -"${pgid}" 2>/dev/null
            sleep 0.1
        done

        f=()
        for p in "${pids[@]}"; do
            kill -0 "$p" 2>/dev/null && f+=("$p")
        done

        if [ ${#f[@]} -ne 0 ]; then
            echo "Failed: ${f[*]}"
