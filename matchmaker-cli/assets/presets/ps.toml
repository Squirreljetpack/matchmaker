# Find and kill processes

[start]
command = "ps -eo pgid,pid,user,%cpu,vsz,rss,etime,stat,command"
additional_commands = [
    "ps -eo pgid,pid,user,%cpu,vsz,rss,etime,stat,command",
    "lsof -nP -i",
]
ansi = false
trim = true

[header]
header_lines = 1
content = '[procs]'
style.modifier = ""

[columns]
split = ' +'
max = 9
default = 9

[matcher]
# --- Preview ---

[preview]
# show = false
wrap = false
trim_ends = true

[results]
min_width = 4

[[preview.layout]]
# Tree view
command = '''
if command -v pstree >/dev/null 2>&1; then
    if [[ "$OSTYPE" == "darwin"* ]]; then
        pstree -p {2}
    else
        pstree -ap {2}
    fi
else
    if ps --version 2>/dev/null | grep -q procps; then
        ps -f --forest -p $pid
    else
        if [[ "$OSTYPE" == "darwin"* ]]; then
            args=,wq
        else
            args=,thcount
        fi

        ps -ww -eo user,pid,ppid,pgid,sess,tty,lstart,time,rss,vsz,pcpu,pmem,stat$args,command {2}
    fi
fi
'''

[[preview.layout]]
command = "echo '### Resources ###\n'; top -pid {2}"
initial.tail = true
min = 13

[[preview.layout]]
command = "echo '### Ports ###\n'; lsof -p {2}"

[binds]
"Reloaded" = '''Transform(
    HEADERS=(
      '[procs]'
      '[ports]'
    )
    setopt KSH_ARRAYS 2>/dev/null
    echo "SetHeader(${HEADERS[$MM_INDEX]})"
)
'''
"@reload_2" = []

"@accept" = ["#print pid", "Become(printf '%s\n' {+2})"]
"@accept_2" = ["#print active", "Become(printf '%s\n' {+!})"]
"@copy" = "CopyAsync(printf '%s\n' {+2})"
"@show" = "RunPreview(echo {9})"

"ctrl-k" = [
    "#kill",
    '''ExecuteOrConfirm(
        pids=({+2})
        [ ${#pids[@]} -gt 1 ] && {
            printf "Kill: %s [y/N] " "${pids[*]}"
            read -r
            [[ $REPLY != [yY]* ]] && exit 0
        }

        for p in "${pids[@]}"; do
            kill "$p" 2>/dev/null
            sleep 0.1
        done

        f=()
        for p in "${pids[@]}"; do
            kill -0 "$p" 2>/dev/null && f+=("$p")
        done

        if [ ${#f[@]} -ne 0 ]; then
            echo "Failed: ${f[*]}"
            exit 1
        fi

        exit 0
    )''',
    "Reload",
]

