[tui]
    percentage = 60
    min        = 10
    max        = 120

[ui]

[query]
    prompt_style.fg = "Red"

[results]
    wrap = true

[columns]
    max     = 3
    split   = '^(.*?):(\d+:\d+):(.*)$'
    default = 3

[preview]
    show              = true
    wrap              = true
    scroll.percentage = 70
    scroll.index      = 2

[[preview.layout]]
    command = '''
$p = {}
if (Test-Path -LiteralPath $p -PathType Container) {
    if (Get-Command eza -ErrorAction SilentlyContinue) {
        eza --color=always -T -L 2 $p
    } else {
        Get-ChildItem -LiteralPath $p | Select-Object -First 20 | ForEach-Object { "  $($_.Name)" }
    }
} else {
    if (Get-Command bat -ErrorAction SilentlyContinue) {
        bat --binary no-printing --color=always $p
    } elseif ($env:PAGER) {
        & $env:PAGER $p
    } else {
        Get-Content -LiteralPath $p -Raw
    }
}
'''
    side = "right"
    percentage = 40
    min = 30
    max = 120
    border.type = "Plain"
    border.padding = [ 2, 0 ]

[[preview.layout]]
    command = '''
$line = {2}
if (Get-Command bat -ErrorAction SilentlyContinue) {
    bat --color=always --highlight-line ($line -split ':')[0] {1}
} else {
    Get-Content -LiteralPath {1} -Raw
}
'''
    side = "top"
    percentage = 50
    min = 5
    max = 50
    border = { type = "LightDoubleDashed", color = "DarkGray" }

[[preview.layout]]
    side           = "right"
    percentage     = 75
    min            = 5
    max            = 240
    border.type    = "Plain"
    border.padding = [ 2, 0 ]

[binds]
    # UI
    "ctrl-c"        = "Quit"
    "esc"           = "Quit"
    "enter"         = "Become($env:EDITOR {1})"
    "ctrl-a"        = "CycleAll"
    "tab"           = [ "Toggle", "Down" ]
    "shift-backtab" = [ "Toggle", "Up" ]

    # Edit
    "right"      = "ForwardChar"
    "left"       = "BackwardChar"
    "ctrl-right" = "ForwardWord"
    "ctrl-left"  = "BackwardWord"
    "backspace"  = "DeleteChar"
    "ctrl-h"     = "DeleteWord"
    "ctrl-u"     = "Cancel"
    "alt-a"      = "QueryPos(0)"

    # Navigation
    "up"               = "Up"
    "down"             = "Down"
    "pageup"           = "HalfPageUp"
    "pagedown"         = "HalfPageDown"
    "shift-up"         = "PreviewHalfPageUp"
    "shift-down"       = "PreviewHalfPageDown"
    "ctrl-shift-up"    = "VScroll(1)"
    "ctrl-shift-down"  = "VScroll(-1)"
    "ctrl-shift-left"  = "HScroll(-1)"
    "ctrl-shift-right" = "HScroll(1)"
    "alt-up"           = "VScroll(1)"
    "alt-down"         = "VScroll(-1)"
    "alt-left"         = "HScroll(-1)"
    "alt-right"        = "HScroll(1)"

    # Columns
    "ctrl-." = "NextColumn"

    # Preview
    "shift+scrollup"   = "PreviewUp"
    "shift+scrolldown" = "PreviewDown"
    "?"                = "SwitchPreview"
    "shift-?"          = "SwitchPreview"
    "ctrl-shift-/"     = "CyclePreview"
    "alt-h"            = "Help"
    "alt-1"            = "Pos(0)"

    # Programmable
    "ctrl-l" = "Execute(powershell -Command \"& { $val = eval $env:MM_PREVIEW_COMMAND; $val | Out-Host }\")"
    "ctrl-o" = "Execute($env:EDITOR {})"
    "alt-o"  = "Become($env:EDITOR {})"
    "ctrl-r" = "@reload"

    "Start" = "@enter_rg"
    "@enter_rg" = [
        "Filtering(false)",
        "Bind(QueryChange = Reload)",
        '''Transform(
        if ($env:MM_QUERY) {
            $stripped = $env:MM_QUERY -replace '^%1 ', ''
            Write-Output "SetStyledPrompt({blue,italic:($stripped) } )"
        } else {
            Write-Output "SetPrompt(rg> )"
        }
        Write-Output "SetQuery($env:MM_STORE)"
        Write-Output "Store($env:MM_QUERY)"
    )''',
        "Bind(@reload = @enter_mm)",
    ]
    "@enter_mm" = [
        "Filtering(true)",
        "Unbind(QueryChange)",
        '''Transform(
        if ($env:MM_QUERY) {
            Write-Output "SetPrompt(($env:MM_QUERY) )"
        } else {
            Write-Output "SetStyledPrompt({blue,italic:mm> })"
        }
        Write-Output "SetQuery($env:MM_STORE)"
        Write-Output "Store($env:MM_QUERY)"
        Write-Output "SwitchColumn(1)"
    )''',
        "Bind(@reload = @enter_rg)",
    ]

[start]
    command_input_separator = "\\0"
    command                 = '''rg --column --line-number --no-heading --color=always --smart-case $env:FZF_QUERY'''
    ansi                    = true
