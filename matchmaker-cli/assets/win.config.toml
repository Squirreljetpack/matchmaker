[tui]
percentage = 60
min = 10
max = 120

[ui]

[query]

[results]
wrap = true

[preview]
show = true
wrap = true

[[preview.layout]]
command = '''
$p = {1}
if (Test-Path -LiteralPath $p -PathType Container) {
    if (Get-Command eza -ErrorAction SilentlyContinue) {
        eza --color=always -T -L 2 $p
    } else {
        Get-ChildItem -LiteralPath $p | Select-Object -First 20 | ForEach-Object { "  $($_.Name)" }
    }
} else {
    if (Get-Command bat -ErrorAction SilentlyContinue) {
        bat --binary no-printing --color=always $p
    } elseif ($env:PAGER) {
        & $env:PAGER $p
    } else {
        Get-Content -LiteralPath $p -Raw
    }
}
'''
side = "right"
percentage = 40
min = 30
max = 120

border.type = "Plain"
border.padding = [2, 0]

[[preview.layout]]
side = "top"
percentage = 50
min = 5
max = 50

border.type = "Plain"

[[preview.layout]]
side = "right"
percentage = 75
min = 5
max = 240

border.type = "Plain"
border.padding = [2, 0]

[binds]
# UI
"ctrl-c" = "Quit"
"esc" = "Quit"
"enter" = "Accept"
"ctrl-a" = "CycleAll"
"tab" = ["Toggle", "Down"]
"shift-backtab" = ["Toggle", "Up"]

# Edit
"right" = "ForwardChar"
"left" = "BackwardChar"
"ctrl-right" = "ForwardWord"
"ctrl-left" = "BackwardWord"
"backspace" = "DeleteChar"
"ctrl-h" = "DeleteWord"
"ctrl-u" = "Cancel"
"alt-a" = "QueryPos(0)"

# Navigation
"up" = "Up"
"down" = "Down"
"pageup" = "HalfPageUp"
"pagedown" = "HalfPageDown"
"shift-up" = "PreviewHalfPageUp"
"shift-down" = "PreviewHalfPageDown"
"ctrl-shift-up" = "VScroll(1)"
"ctrl-shift-down" = "VScroll(-1)"
"ctrl-shift-left" = "HScroll(-1)"
"ctrl-shift-right" = "HScroll(1)"
"alt-up" = "VScroll(1)"
"alt-down" = "VScroll(-1)"
"alt-left" = "HScroll(-1)"
"alt-right" = "HScroll(1)"

# Columns
"ctrl-." = "NextColumn"

# Preview
"shift+scrollup" = "PreviewUp"
"shift+scrolldown" = "PreviewDown"
"?" = "SwitchPreview"
"shift-?" = "SwitchPreview"
"ctrl-shift-/" = "CyclePreview" # cycle preview layouts
"alt-h" = "Help"
"alt-1" = "Pos(0)"

# Programmable
"ctrl-l" = "@look" # "maximize" the preview
"ctrl-o" = "@open"
"alt-o" = "@enter"
"ctrl-r" = "@reload"

"@look" = "Execute(%MM_PREVIEW_COMMAND% | %PAGER%)"
"@open" = "Execute(%EDITOR% {1})"
"@enter" = "Become(%EDITOR% {1})"
"@reload" = "Reload"

[start]
command = '''
if (Get-Command fd -ErrorAction SilentlyContinue) {
    fd --strip-cwd-prefix
} else {
    Get-ChildItem -Recurse -File | ForEach-Object FullName
}
'''
