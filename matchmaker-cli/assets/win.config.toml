[tui]
percentage = 60
min = 10
max = 120

# --- UI ---
[ui]

[query]
prompt_style.fg = "Gray"
prompt_style.modifier = "ITALIC"

[results]
# wrap = true
max_height = 16

[status]

[header]

[footer]
# --- Preview ---
[preview]
show = true
wrap = true
scroll_wrap = true

[[preview.layout]]
command = '''
$p = {1}
if (Test-Path -LiteralPath $p -PathType Container) {
    if (Get-Command eza -ErrorAction SilentlyContinue) {
        eza --color=always -T -L 2 $p
    } else {
        Get-ChildItem -LiteralPath $p | Select-Object -First 20 | ForEach-Object { "  $($_.Name)" }
    }
} else {
    if (Get-Command bat -ErrorAction SilentlyContinue) {
        bat --binary no-printing --color=always $p
    } elseif ($env:PAGER) {
        & $env:PAGER $p
    } else {
        Get-Content -LiteralPath $p -Raw
    }
}
'''

side = "right"
percentage = 40
min = 30
max = 120
border.type = "Plain"
border.padding = [2, 0]

[[preview.layout]]
side = "top"
percentage = 55
min = 5
max = 50
border.type = "Plain"

[[preview.layout]]
side = "right"
percentage = 75
min = 5
max = 240
border.type = "Plain"
border.padding = [2, 0]

[previewer]
always_trigger = true

# --- Misc ---
[matcher]

[columns]

[start.command]
command = '''
if (Get-Command fd -ErrorAction SilentlyContinue) {
    fd --strip-cwd-prefix
} else {
    Get-ChildItem -Recurse -File | ForEach-Object FullName
}
'''

[start]
ansi = false # don't set to true here
skip_invalid_lines = true # set false to error on encountering invalid utf-8

[exit]
abort_empty = true

[envs]
# CLIPcmd = # Leave blank to auto-determine
# PASTEcmd = # Leave blank to auto-determine
# PAGER = # Leave blank to auto-determine
# EDITOR = # Leave blank to auto-determine

# --- Binds ---
[binds]
# Essentia
"ctrl-c" = "Quit"
"esc" = "Quit"
"enter" = "@accept"
"alt-enter" = "@accept_2"
"ctrl-enter" = "@accept_2"
"ctrl-a" = "CycleAll"
"tab" = ["Toggle", "Down"]
"shift-backtab" = ["Toggle", "Up"]

# Edit
"right" = "ForwardChar"
"left" = "BackwardChar"
"ctrl-right" = "ForwardWord"
"ctrl-left" = "BackwardWord"
"backspace" = "DeleteChar"
"ctrl-h" = "DeleteWord"
"ctrl-u" = "Cancel"
"alt-a" = "QueryPos(0)"

# Navigation
"up" = "Up"
"down" = "Down"
"pagedown" = "HalfPageDown"
"pageup" = "HalfPageUp"
"shift-up" = "PreviewHalfPageUp"
"shift-down" = "PreviewHalfPageDown"
"ctrl-shift-up" = "VScroll(1)"
"ctrl-shift-down" = "VScroll(-1)"
"ctrl-shift-left" = "HScroll(-1)"
"ctrl-shift-right" = "HScroll(1)"
"alt-up" = "VScroll(1)"
"alt-down" = "VScroll(-1)"
"alt-left" = "HScroll(-1)"
"alt-right" = "HScroll(1)"
"alt-1" = "Pos(0)"
"alt-0" = "Pos(-1)"

# Columns
"ctrl-." = "NextColumn"
"ctrl-shift-." = "PrevColumn"
"alt-." = "NextColumn"
"alt-shift-." = "PrevColumn"

# Preview
"shift+scrollup" = "PreviewUp"
"shift+scrolldown" = "PreviewDown"
"alt-/" = "PreviewJump"
"?" = "SwitchPreview"
# cycle preview layouts
"ctrl-/" = "NextPreview" # requires keyboard enhancement
"ctrl-shift-/" = "PrevPreview" # requires keyboard enhancement
"alt-shift-/" = "NextPreview"

"alt-h" = "Help"
"alt-shift-=" = "ExpandPreview"
"alt-+" = "ExpandPreview"
"alt-hyphen" = "ShrinkPreview"

# Reserved
"F1" = "@help"
"F2" = "@rename"
"F3" = "@search"
"F4" = "@rm"
"F5" = "@refresh"
"F6" = "@cycle"
"F7" = "@build"
"F8" = "@step"
"F9" = "@toggle"
"F10" = "@menu"
"F11" = "@look"
"F12" = "@save"

# Programmable
"ctrl-l" = "@look" # "maximize" the preview
"ctrl-o" = "@open"
"alt-o" = "@open_2"
"ctrl-r" = "@reload"
"ctrl-shift-r" = "@reload_2"
"ctrl-shift-n" = "@next"
"ctrl-shift-p" = "@prev"
"ctrl-tab" = "@next"
"alt-tab" = "@next"
"ctrl-shift-tab" = "@prev"
"ctrl-shift-backtab" = "@prev"
"ctrl-d" = "@rm"
"Delete" = "@rm"
"ctrl-s" = "@show"

"@accept" = "Accept"
"@accept_2" = "Accept"
"@look" = "Execute(powershell -Command \"$env:MM_PREVIEW_COMMAND | & $env:PAGER\")"
"@open" = "Execute(powershell -Command \"& $env:EDITOR {1}\")"
"@open_2" = "Become(powershell -Command \"& $env:EDITOR {1}\")"
"@reload" = "Reload"
"@next" = ["ReloadNext", "Cancel"]
"@prev" = ["ReloadPrev", "Cancel"]
"@help" = "Help"
"@refresh" = "Redraw"

# Printing
"alt-p" = "@print"
"alt-shift-p" = "@print_2"
"ctrl-y" = "@copy"
"ctrl-shift-y" = "@copy_all"
"alt-shift-y" = "@copy_all"
"alt-y" = "@copy_active"

"@print" = "Print({-})"
"@print_2" = "Print({-!})"
"@copy" = "CopyAsync(Write-Output {+1})"
"@copy_all" = "CopyAsync(Write-Output {})"
"@copy_active" = "CopyAsync(Write-Output {+!})"
